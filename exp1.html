<!DOCTYPE html>
<html>
<head>
    <title>Event System - Registration</title>
    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: #ffffff;
            padding: 30px 40px;
            width: 550px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
        }

        .form-group label {
            width: 160px;
            font-weight: bold;
            color: #444;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            flex: 1;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        .gender-group {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .gender-group label {
            font-weight: normal;
            width: auto;
        }

        textarea {
            resize: none;
            height: 90px;
        }

        .submit-btn {
            text-align: center;
            margin-top: 20px;
        }

        .submit-btn button {
            background: #667eea;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn button:hover {
            background: #5a67d8;
        }

    </style>
</head>

<body>

<div class="form-container">
    <h2>Student Registration Form</h2>

    <form>

        <div class="form-group">
            <label>First Name:</label>
            <input type="text" required>
        </div>

        <div class="form-group">
            <label>Last Name:</label>
            <input type="text" required>
        </div>

        <div class="form-group">
            <label>Registration No:</label>
            <input type="text" required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" required>
        </div>

        <div class="form-group">
            <label>Phone Number:</label>
            <input type="tel" required>
        </div>

        <div class="form-group">
            <label>Department:</label>
            <select required>
                <option value="">Select Department</option>
                <option>CSE</option>
                <option>ECE</option>
                <option>MECH</option>
                <option>MBA</option>
            </select>
        </div>

        <div class="form-group">
            <label>Year of Study:</label>
            <select required>
                <option value="">Select Year</option>
                <option>1st Year</option>
                <option>2nd Year</option>
                <option>3rd Year</option>
                <option>4th Year</option>
            </select>
        </div>

        <div class="form-group">
            <label>Gender:</label>
            <div class="gender-group">
                <label><input type="radio" name="gender"> Male</label>
                <label><input type="radio" name="gender"> Female</label>
            </div>
        </div>

        <div class="form-group">
            <label>Clubs You Are Part Of:</label>
            <input type="text" placeholder="e.g. Coding Club, Robotics Club">
        </div>

        <div class="form-group">
            <label>Hobbies:</label>
            <input type="text" placeholder="e.g. Coding, Music, Sports">
        </div>

        <div class="form-group">
            <label>About You:</label>
            <textarea placeholder="Write something about yourself..."></textarea>
        </div>

        <div class="submit-btn">
            <button type="submit">Register</button>
        </div>

    </form>
</div>

</body>
</html>
