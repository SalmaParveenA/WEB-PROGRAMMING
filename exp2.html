<!DOCTYPE html>
<html>
<head>
    <title>Admin - Event Management</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        header {
            background-color: #2a5298;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h3 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-group label {
            width: 150px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        .btn {
            text-align: center;
            margin-top: 20px;
        }

        button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            background-color: #2a5298;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #1e3c72;
        }

        .event-list {
            margin-top: 30px;
        }

        .event-card {
            background: #f1f3f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .event-card h4 {
            margin: 0 0 5px;
        }

        .delete-btn {
            background: red;
            margin-top: 8px;
        }

    </style>
</head>

<body>

<header>
    <h2>Admin Panel - Manage Events</h2>
</header>

<div class="container">

    <h3>Add New Event</h3>

    <div class="form-group">
        <label>Event Title:</label>
        <input type="text" id="title">
    </div>

    <div class="form-group">
        <label>Department:</label>
        <select id="department">
            <option value="">Select</option>
            <option>CSE</option>
            <option>ECE</option>
            <option>MECH</option>
            <option>MBA</option>
        </select>
    </div>

    <div class="form-group">
        <label>Event Type:</label>
        <select id="type">
            <option>Technical</option>
            <option>Cultural</option>
            <option>Sports</option>
            <option>Workshop</option>
        </select>
    </div>

    <div class="form-group">
        <label>Date:</label>
        <input type="date" id="date">
    </div>

    <div class="form-group">
        <label>Venue:</label>
        <input type="text" id="venue">
    </div>

    <div class="form-group">
        <label>Description:</label>
        <textarea id="description"></textarea>
    </div>

    <div class="btn">
        <button onclick="addEvent()">Add Event</button>
    </div>

    <div class="event-list" id="eventList">
        <h3>Added Events</h3>
    </div>

</div>

<script>

let events = [];

function addEvent() {

    let title = document.getElementById("title").value;
    let department = document.getElementById("department").value;
    let type = document.getElementById("type").value;
    let date = document.getElementById("date").value;
    let venue = document.getElementById("venue").value;
    let description = document.getElementById("description").value;

    if (title === "" || department === "" || date === "") {
        alert("Please fill required fields");
        return;
    }

    let event = {
        title: title,
        department: department,
        type: type,
        date: date,
        venue: venue,
        description: description
    };

    events.push(event);
    displayEvents();
    clearForm();
}

function displayEvents() {

    let eventList = document.getElementById("eventList");
    eventList.innerHTML = "<h3>Added Events</h3>";

    for (let i = 0; i < events.length; i++) {

        eventList.innerHTML +=
            "<div class='event-card'>" +
            "<h4>" + events[i].title + "</h4>" +
            "<p><b>Department:</b> " + events[i].department + "</p>" +
            "<p><b>Type:</b> " + events[i].type + "</p>" +
            "<p><b>Date:</b> " + events[i].date + "</p>" +
            "<p><b>Venue:</b> " + events[i].venue + "</p>" +
            "<p>" + events[i].description + "</p>" +
            "<button class='delete-btn' onclick='deleteEvent(" + i + ")'>Delete</button>" +
            "</div>";
    }
}

function deleteEvent(index) {
    events.splice(index, 1);
    displayEvents();
}

function clearForm() {
    document.getElementById("title").value = "";
    document.getElementById("department").value = "";
    document.getElementById("date").value = "";
    document.getElementById("venue").value = "";
    document.getElementById("description").value = "";
}

</script>

</body>
</html>
